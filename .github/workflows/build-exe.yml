name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependency
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: pyinstaller WinSaveOpenFolders.spec --noconfirm

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/WinSaveOpenFolders.exe release/
          Copy-Item LICENSE release/
          Copy-Item README.md release/
          Compress-Archive -Path release/* -DestinationPath WinSaveOpenFolders-windows.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinSaveOpenFolders-windows
          path: |
            dist/WinSaveOpenFolders.exe
            WinSaveOpenFolders-windows.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WinSaveOpenFolders-windows.zip
