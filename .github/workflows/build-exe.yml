name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name WinSaveOpenFolders `
            --icon assets/icon.ico `
            --add-data "assets;assets" `
            WinSaveOpenFolders.py

      - name: Show build output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/WinSaveOpenFolders.exe release/
          Copy-Item LICENSE release/
          Copy-Item README.md release/
          Copy-Item WinSaveOpenFolders.cmd release/
          Copy-Item WinSaveOpenFolders.ps1 release/
          Compress-Archive -Path release/* -DestinationPath WinSaveOpenFolders-windows.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinSaveOpenFolders-windows
          path: |
            release/*
            WinSaveOpenFolders-windows.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WinSaveOpenFolders-windows.zip
